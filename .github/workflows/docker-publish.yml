name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"        # Trigger on version tags like v1.0.0
  pull_request:
    branches:
      - main            # Build (but don't push) on PRs to main for validation

env:
  # Uses GitHub Container Registry (free, no Docker Hub account needed)
  REGISTRY: ghcr.io
  # github.repository resolves to e.g. "paragiscool/compliance-monitoring-system"
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read       # FIX FOR 403 ERROR: Grants token permission to checkout code
      packages: write      # Required to push to ghcr.io

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out the repository code
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4  # FIX FOR NODE 20 WARNING: Updated to v4

      # -----------------------------------------------------------------------
      # 2. Set up Docker Buildx for multi-platform builds and caching
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # 3. Log in to GitHub Container Registry
      #    GITHUB_TOKEN is auto-provided by Actions — no secret setup needed.
      # -----------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 4. Extract metadata for tagging the image
      # -----------------------------------------------------------------------
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      # -----------------------------------------------------------------------
      # 5. Build and push the image
      # -----------------------------------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
