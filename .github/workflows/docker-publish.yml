name: Docker Image CI (Bare Metal Bypass)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Crucial: Give the raw runner permission to upload to the registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Raw Docker Build & Push
        run: |
          # 1. Format the image name to lowercase (Docker requirement)
          IMAGE_ID=$(echo ghcr.io/${{ github.repository }} | tr '[A-Z]' '[a-z]')
          
          # 2. Login to GHCR using the built-in GitHub token
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # 3. Build the image locally on the runner
          docker build -t $IMAGE_ID:latest .
          
          # 4. Push directly to the registry
          docker push $IMAGE_ID:latest
